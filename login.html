<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>Login with Google</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
  <h2>AI Instructor Pro</h2>
  <button id="googleBtn">Continue with Google</button>

  <script>
    const SUPABASE_URL = "https://uasvikbxjoxhxcnserhj.supabase.co";
    const SUPABASE_ANON_KEY = "sb_publishable_nsp-0mvfopQyondhh7fWDQ_siHRPtTE";

    const client = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    document.getElementById("googleBtn").addEventListener("click", async () => {
      await client.auth.signInWithOAuth({
        provider: "google",
        options: {
          redirectTo: "https://fash1980.github.io/ai-instructor-pro/callback.html"
          queryParams: {
          prompt: "select_account"
        }
        }
      });
    });
  </script>
</body>
</html>
