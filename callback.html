<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>Completing Login</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
  <p>Completing login...</p>

  <script>
    const SUPABASE_URL = "https://uasvikbxjoxhxcnserhj.supabase.co";
    const SUPABASE_ANON_KEY = "sb_publishable_nsp-0mvfopQyondhh7fWDQ_siHRPtTE";

    const client = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    async function finishLogin() {
      const { data, error } = await client.auth.getSession();

      if (error || !data.session) {
        document.body.innerHTML = "<p>Login failed.</p>";
        return;
      }

      const token = data.session.access_token;

      window.location.href =
        "https://ai-instructor-pro.streamlit.app/?access_token=" +
        encodeURIComponent(token);
    }

    finishLogin();
  </script>
</body>
</html>
